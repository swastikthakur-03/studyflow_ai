version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: studyflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studyflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studyflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-studyflow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studyflow} -d ${POSTGRES_DB:-studyflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB ──────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: studyflow_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyflow_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-studyflow}:${POSTGRES_PASSWORD:-studyflow_secret}@postgres:5432/${POSTGRES_DB:-studyflow_db}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-change_this_in_production_min_32_chars}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - UPLOAD_DIR=/app/uploads
      - ENVIRONMENT=development
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app
    depends_on:
     - postgres
     - chromadb
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studyflow_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  chroma_data: